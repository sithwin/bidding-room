services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: carat
      POSTGRES_PASSWORD: carat_test
      POSTGRES_DB: postgres
    ports:
      - '5433:5432'
    volumes:
      - ./tests/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carat']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: carat
      RABBITMQ_DEFAULT_PASS: carat_test
    ports:
      - '5673:5672'
      - '15673:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 10s
      retries: 10

  user-auth:
    build:
      context: .
      dockerfile: apps/user-auth/Dockerfile
    environment:
      PORT: '3001'
      DATABASE_URL: postgresql://carat:carat_test@postgres:5432/user_test
      AMQP_URL: amqp://carat:carat_test@rabbitmq:5672
      JWT_PRIVATE_KEY: *jwt-private-key
      JWT_PUBLIC_KEY: *jwt-public-key
      NODE_ENV: test
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15

  catalogue:
    build:
      context: .
      dockerfile: apps/catalogue/Dockerfile
    environment:
      PORT: '3002'
      DATABASE_URL: postgresql://carat:carat_test@postgres:5432/catalogue_test
      JWT_PUBLIC_KEY: *jwt-public-key
      R2_BUCKET: test-bucket
      R2_ACCOUNT_ID: test-account
      R2_ACCESS_KEY_ID: test-key
      R2_SECRET_ACCESS_KEY: test-secret
      R2_PUBLIC_BASE_URL: http://localhost:9000
      NODE_ENV: test
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15

  auction-engine:
    build:
      context: .
      dockerfile: apps/auction-engine/Dockerfile
    environment:
      PORT: '3003'
      DATABASE_URL: postgresql://carat:carat_test@postgres:5432/auction_test
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      RABBITMQ_URL: amqp://carat:carat_test@rabbitmq:5672
      JWT_PUBLIC_KEY: *jwt-public-key
      NODE_ENV: test
    ports:
      - '3003:3003'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3003/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15

  payment:
    build:
      context: .
      dockerfile: apps/payment/Dockerfile
    environment:
      PORT: '3004'
      DATABASE_URL: postgresql://carat:carat_test@postgres:5432/payment_test
      RABBITMQ_URL: amqp://carat:carat_test@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_test}
      FRONTEND_URL: http://localhost:3000
      JWT_PUBLIC_KEY: *jwt-public-key
      NODE_ENV: test
    ports:
      - '3004:3004'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3004/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15

  shipping:
    build:
      context: .
      dockerfile: apps/shipping/Dockerfile
    environment:
      PORT: '3006'
      DATABASE_URL: postgresql://carat:carat_test@postgres:5432/shipping_test
      AMQP_URL: amqp://carat:carat_test@rabbitmq:5672
      JWT_PUBLIC_KEY: *jwt-public-key
      NODE_ENV: test
    ports:
      - '3006:3006'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3006/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15

  notification:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    environment:
      PORT: '3005'
      DATABASE_URL: postgresql://carat:carat_test@postgres:5432/notification_test
      RABBITMQ_URL: amqp://carat:carat_test@rabbitmq:5672
      RESEND_API_KEY: re_test_key
      RESEND_FROM: noreply@test.carat-room.internal
      TWILIO_ACCOUNT_SID: test-sid
      TWILIO_AUTH_TOKEN: test-token
      TWILIO_PHONE_NUMBER: '+15005550006'
      USER_SERVICE_URL: http://user-auth:3001
      CATALOGUE_SERVICE_URL: http://catalogue:3002
      AUCTION_ENGINE_URL: http://auction-engine:3003
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: test
    ports:
      - '3005:3005'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3005/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 15
